name: macOS build

# Build native macOS binaries of peage-mcp (Intel + Apple Silicon), run them on real
# hardware (version + a live TLS call to the rail), fuse into a universal .mcpb, and —
# when run for a tag — attach it to that release. Native build = verified, unlike the
# from-Linux cross-compile in scripts/xbuild-macos.sh.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the universal .mcpb to (blank = artifact only)"
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel
            arch: x86_64
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install machin (native macOS binary)
        run: |
          curl -fsSL https://raw.githubusercontent.com/javimosch/machin/main/install.sh | MACHIN_NO_SKILL=1 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Point the C compiler at a STATIC OpenSSL (portable binary, no brew dep)
        run: |
          OSSL="$(brew --prefix openssl@3)"
          test -f "$OSSL/lib/libssl.a" && test -f "$OSSL/lib/libcrypto.a"
          # A dir holding only the .a files, first on LIBRARY_PATH, forces -lssl/-lcrypto to link static.
          mkdir -p "$RUNNER_TEMP/ossl-static"
          ln -sf "$OSSL/lib/libssl.a" "$OSSL/lib/libcrypto.a" "$RUNNER_TEMP/ossl-static/"
          echo "CPATH=$OSSL/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$RUNNER_TEMP/ossl-static" >> "$GITHUB_ENV"

      - name: Build
        run: |
          ./build.sh
          file peage-mcp
          # arch sanity
          lipo -archs peage-mcp | grep -qw "${{ matrix.arch }}"

      - name: Smoke test — run the binary + a live TLS call to the rail
        run: |
          set -e
          test "$(./peage-mcp version | python3 -c 'import json,sys;print(json.load(sys.stdin)["name"])')" = "peage-mcp"
          # The real test: the binary runs AND its OpenSSL talks HTTPS to peage.intrane.fr.
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"peage_solvency","arguments":{}}}' \
            | PEAGE_MCP_CONFIG="$RUNNER_TEMP/ci-wallet.json" ./peage-mcp serve > out.jsonl 2>/dev/null
          echo "--- rail response ---"; cat out.jsonl
          grep -q '"solvent"' out.jsonl || { echo "::error::TLS/rail smoke test failed"; exit 1; }

      - name: Verify only system dylibs (no brew/openssl dylib leaked in)
        run: |
          DEPS="$(otool -L peage-mcp | tail -n +2 | awk '{print $1}')"
          echo "$DEPS"
          echo "$DEPS" | grep -vqE '^/usr/lib/|^/System/' && { echo "::error::non-system dylib dependency"; exit 1; } || true

      - uses: actions/upload-artifact@v4
        with:
          name: peage-mcp-darwin-${{ matrix.arch }}
          path: peage-mcp

  universal:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: slices }

      - name: lipo → universal + package .mcpb
        run: |
          lipo -create \
            slices/peage-mcp-darwin-x86_64/peage-mcp \
            slices/peage-mcp-darwin-arm64/peage-mcp \
            -output peage-mcp
          chmod +x peage-mcp
          lipo -info peage-mcp
          # verify the universal runs on this (arm64) runner too
          test "$(./peage-mcp version | python3 -c 'import json,sys;print(json.load(sys.stdin)["version"])')" != ""
          python3 - <<'PY'
          import json
          m=json.load(open("manifest.json"))
          m["compatibility"]={"platforms":["darwin"],"runtimes":{}}
          json.dump(m,open("manifest.json","w"),indent=2)
          PY
          mkdir pkg && cp manifest.json peage-mcp pkg/
          (cd pkg && zip -q -r ../peage-mcp-darwin-universal.mcpb manifest.json peage-mcp)
          shasum -a 256 peage-mcp-darwin-universal.mcpb

      - uses: actions/upload-artifact@v4
        with:
          name: peage-mcp-darwin-universal
          path: |
            peage-mcp
            peage-mcp-darwin-universal.mcpb

      - name: Attach to the release (tag builds, or a dispatch with a tag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          if [ -n "$TAG" ]; then
            cp peage-mcp peage-mcp-darwin-universal
            gh release upload "$TAG" peage-mcp-darwin-universal.mcpb peage-mcp-darwin-universal \
              --repo "${{ github.repository }}" --clobber
            echo "attached to release $TAG"
          else
            echo "no tag — artifacts only"
          fi
