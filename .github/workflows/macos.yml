name: macOS build

# Build a universal (x86_64 + arm64) macOS binary of peage-mcp on a SINGLE Apple-Silicon
# runner — no dependency on GitHub's scarce Intel runners.
#   arm64   : native machin build, RUN + live TLS call to the rail (fully verified).
#   x86_64  : Xcode clang `-arch x86_64` + a self-built x86_64 OpenSSL; structurally
#             verified (valid Mach-O, system-only dylibs) and run under Rosetta if present.
# The two slices are lipo-fused into a universal .mcpb and attached to the tag's release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the universal .mcpb to (blank = artifact only)"
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  OSSL_VER: "3.3.2"

jobs:
  macos:
    runs-on: macos-14           # Apple Silicon; builds both arches
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install machin (native macOS binary)
        run: |
          curl -fsSL https://raw.githubusercontent.com/javimosch/machin/main/install.sh | MACHIN_NO_SKILL=1 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ---- arm64 slice: native build + real run + live TLS (the verified path) --------
      - name: Build arm64 (native) with static OpenSSL
        run: |
          OSSL="$(brew --prefix openssl@3)"
          test -f "$OSSL/lib/libssl.a" && test -f "$OSSL/lib/libcrypto.a"
          mkdir -p "$RUNNER_TEMP/ossl-arm"
          ln -sf "$OSSL/lib/libssl.a" "$OSSL/lib/libcrypto.a" "$RUNNER_TEMP/ossl-arm/"
          CPATH="$OSSL/include" LIBRARY_PATH="$RUNNER_TEMP/ossl-arm" ./build.sh
          mv peage-mcp peage-mcp-arm64
          lipo -archs peage-mcp-arm64 | grep -qw arm64
          file peage-mcp-arm64

      - name: Smoke test arm64 — run + live TLS call to the rail
        run: |
          set -e
          test "$(./peage-mcp-arm64 version | python3 -c 'import json,sys;print(json.load(sys.stdin)["name"])')" = "peage-mcp"
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"peage_solvency","arguments":{}}}' \
            | PEAGE_MCP_CONFIG="$RUNNER_TEMP/w.json" ./peage-mcp-arm64 serve > out.jsonl 2>/dev/null
          cat out.jsonl
          grep -q solvent out.jsonl || { echo "::error::arm64 TLS/rail smoke test failed"; exit 1; }

      # ---- x86_64 slice: cross within macOS (clang -arch x86_64 + self-built OpenSSL) --
      - name: Cache x86_64 OpenSSL
        id: ossl-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ossl-x64-install
          key: ossl-x64-${{ env.OSSL_VER }}-macos14

      - name: Build x86_64 OpenSSL (cache miss)
        if: steps.ossl-cache.outputs.cache-hit != 'true'
        run: |
          cd "$RUNNER_TEMP"
          curl -sL "https://github.com/openssl/openssl/releases/download/openssl-$OSSL_VER/openssl-$OSSL_VER.tar.gz" | tar xz
          cd "openssl-$OSSL_VER"
          CC="clang -arch x86_64" ./Configure darwin64-x86_64 no-asm no-shared no-tests no-docs no-apps >/dev/null
          make -j"$(sysctl -n hw.ncpu)" build_libs
          mkdir -p "$RUNNER_TEMP/ossl-x64-install/lib"
          cp libssl.a libcrypto.a "$RUNNER_TEMP/ossl-x64-install/lib/"
          cp -R include "$RUNNER_TEMP/ossl-x64-install/include"

      - name: Build x86_64 slice (clang -arch x86_64, static OpenSSL)
        run: |
          OX="$RUNNER_TEMP/ossl-x64-install"
          # reuse the app.mfl that build.sh produced; emit portable C and compile for x86_64
          machin build app.mfl --emit-c > app.c
          clang -arch x86_64 -O2 -w app.c -I"$OX/include" "$OX/lib/libssl.a" "$OX/lib/libcrypto.a" -o peage-mcp-x86_64
          file peage-mcp-x86_64
          lipo -archs peage-mcp-x86_64 | grep -qw x86_64
          DEPS="$(otool -L peage-mcp-x86_64 | tail -n +2 | awk '{print $1}')"
          echo "$DEPS"
          echo "$DEPS" | grep -vqE '^/usr/lib/|^/System/' && { echo "::error::x86_64 has a non-system dylib dep"; exit 1; } || true

      - name: Smoke test x86_64 under Rosetta (best-effort)
        run: |
          if arch -x86_64 /usr/bin/true 2>/dev/null; then
            echo "Rosetta present — executing x86_64 slice"
            test "$(arch -x86_64 ./peage-mcp-x86_64 version | python3 -c 'import json,sys;print(json.load(sys.stdin)["name"])')" = "peage-mcp"
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"peage_solvency","arguments":{}}}' \
              | PEAGE_MCP_CONFIG="$RUNNER_TEMP/wx.json" arch -x86_64 ./peage-mcp-x86_64 serve > outx.jsonl 2>/dev/null || true
            grep -q solvent outx.jsonl && echo "x86_64 TLS call OK" || echo "::warning::x86_64 ran but rail call inconclusive"
          else
            echo "::notice::Rosetta not available — x86_64 slice is structurally verified only"
          fi

      # ---- fuse + package -------------------------------------------------------------
      - name: lipo → universal + package .mcpb
        run: |
          lipo -create peage-mcp-x86_64 peage-mcp-arm64 -output peage-mcp
          chmod +x peage-mcp
          lipo -info peage-mcp
          test "$(./peage-mcp version | python3 -c 'import json,sys;print(json.load(sys.stdin)["version"])')" != ""
          python3 - <<'PY'
          import json
          m=json.load(open("manifest.json"))
          m["compatibility"]={"platforms":["darwin"],"runtimes":{}}
          json.dump(m,open("manifest.json","w"),indent=2)
          PY
          mkdir pkg && cp manifest.json peage-mcp pkg/
          (cd pkg && zip -q -r ../peage-mcp-darwin-universal.mcpb manifest.json peage-mcp)
          cp peage-mcp peage-mcp-darwin-universal
          shasum -a 256 peage-mcp-darwin-universal.mcpb peage-mcp-darwin-universal

      - uses: actions/upload-artifact@v4
        with:
          name: peage-mcp-darwin-universal
          path: |
            peage-mcp-darwin-universal
            peage-mcp-darwin-universal.mcpb

      - name: Attach to the release (tag builds, or a dispatch with a tag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          if [ -n "$TAG" ]; then
            gh release upload "$TAG" peage-mcp-darwin-universal.mcpb peage-mcp-darwin-universal \
              --repo "${{ github.repository }}" --clobber
            echo "attached universal .mcpb to release $TAG"
          else
            echo "no tag — artifacts only"
          fi
